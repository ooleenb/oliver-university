# Render Blueprint —— 一个免费 Web Service 同时托管前端与后端。
# 在 Render 控制台选择 “New +” → “Blueprint”，连接这个仓库即可自动读取本文件。
services:
  - type: web
    name: oliver-university
    runtime: node
    plan: free
    # 构建：装前端依赖 → 打包前端(dist) → 装后端依赖
    buildCommand: npm install && npm run build && npm install --prefix server
    # 启动：只跑后端；它会顺带托管 dist/ 里的前端
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      # 生产环境请在 Render 面板把它改成一串随机长字符串
      - key: JWT_SECRET
        generateValue: true
